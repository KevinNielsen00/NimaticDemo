services:
  postgres:
    image: postgres:17
    container_name: nimatic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: nimatic-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./NimaticDemo
    container_name: nimatic-backend
    ports:
      - "5000:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: Backend
      Jwt__Audience: Frontend
      Mqtt__Broker: mosquitto
      Mqtt__Topic: ${MQTT_TOPIC}
      Mqtt__Username: ${MQTT_USERNAME}
      Mqtt__Password: ${MQTT_PASSWORD}
      DefaultCustomerId: ${DEFAULT_CUSTOMER_ID}
    depends_on:
      - postgres
      - mosquitto
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: nimatic-frontend
    ports:
      - "3001:8080"
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  postgres_data:
    name: nimaticdemo_postgres_data